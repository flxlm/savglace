name: Auto PR and Merge dev to main

on:
  push:
    branches: [dev]

jobs:
  auto-merge:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create PR and merge into main
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          EXISTING=$(gh pr list --head dev --base main --state open --json number --jq '.[0].number')
          if [ -z "$EXISTING" ]; then
            gh pr create --head dev --base main \
              --title "chore: sync dev to main" \
              --body "Automated merge from dev branch"
            EXISTING=$(gh pr list --head dev --base main --state open --json number --jq '.[0].number')
          fi
          gh pr merge "$EXISTING" --merge
